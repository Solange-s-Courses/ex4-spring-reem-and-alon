<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Chat Conversation</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />
    <style>
        .chat-container {
            max-width: 700px;
            margin: 2rem auto;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #f9f9f9;
            padding: 1rem;
            height: 80vh;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }

        .messages-list {
            overflow-y: auto;
            flex-grow: 1;
            margin-bottom: 1rem;
            padding-right: 10px;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .message {
            max-width: 70%;
            padding: 0.6rem 1rem;
            border-radius: 15px;
            word-wrap: break-word;
            font-size: 1rem;
            line-height: 1.3;
        }

        .message.sent {
            background-color: #0d6efd; /* כחול bootstrap */
            color: white;
            align-self: flex-end;
        }

        .message.received {
            background-color: #f1f3f5; /* אפור בהיר */
            color: #212529;
            align-self: flex-start;
        }

        .message-time {
            font-size: 0.75rem;
            margin-top: 0.15rem;
        }

        .message.sent .message-time {
            color: #dbe9ff; /* בהיר ונעים על כחול */
            text-align: right;
        }

        .message.received .message-time {
            color: #6c757d; /* אפור בינוני */
            text-align: left;
        }

        .chat-input {
            display: flex;
            gap: 0.5rem;
        }

        .chat-input input[type="text"] {
            flex-grow: 1;
            font-size: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 15px;
            border: 1px solid #ced4da;
            outline: none;
        }

        .chat-input input[type="text"]:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 5px rgba(13, 110, 253, 0.5);
        }

        .chat-input button {
            background-color: #0d6efd;
            border: none;
            color: white;
            padding: 0 1.2rem;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }

        .chat-input button:hover {
            background-color: #0b5ed7;
        }
    </style>
</head>
<body>
<div class="container chat-container">
    <h4 class="mb-3">Chat Conversation</h4>

    <div class="messages-list" id="messagesList">

        <div id="startMsg" th:if="${#lists.isEmpty(messages)}"
             class="d-flex h-100 w-100 justify-content-center align-items-center text-muted">
            <span>Start chat 🗨️</span>
        </div>

        <div th:each="msg : ${messages}"
             th:class="'message ' + (${msg.senderId} == ${userId} ? 'sent' : 'received')"
             th:unless="${#lists.isEmpty(messages)}">
            <div th:text="${msg.content}">Message content</div>
            <div class="message-time">
                <span th:if="${msg.sentAt != null}"  th:text="${#temporals.format(msg.sentAt, 'HH:mm dd/MM/yyyy')}"></span>
                <span th:if="${msg.sentAt == null}">---</span>
            </div>
        </div>
    </div>

    <form method="post" class="chat-input">
        <input type="hidden" name="conversationId" th:value="${conversationId}"/>
        <input type="hidden" name="userId" th:value="${userId}"/>
        <input type="text" name="content" class="form-control chatInput" placeholder="Type your message..." required autocomplete="off"/>
        <button class="btn btn-primary" type="submit">Send</button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script type="module" src="/js/chat.js"></script>
</body>
</html>
