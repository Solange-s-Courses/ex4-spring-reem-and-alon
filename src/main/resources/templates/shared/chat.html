<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>My Conversations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/chat.css}">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">
    <h3 class="mb-4 text-center"><i class="bi bi-chat-dots me-1"></i>Conversations</h3>
    <div th:if="${#lists.isEmpty(chats)}" class="text-center text-muted">
        <p class="mt-5"><i class="bi bi-inbox fs-1"></i></p>
        <p>No chats yet.</p>
    </div>
    <div th:unless="${#lists.isEmpty(chats)}" class="row justify-content-center">
        <div class="col-3 list-group shadow-sm">
            <a th:each="chat : ${chats}"
               th:href="@{/chat/{id}(id=${chat.id})}"
               th:data-chat-id="${chat.id}"
               class="list-group-item list-group-item-action d-flex align-items-center chat-item"
               th:classappend="${chat.id} == ${chatId} ? ' bg-info-subtle' : ''">
                <div sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-person-circle fs-1 avatar me-3"></i>
                </div>
                <div sec:authorize="hasRole('USER')">
                    <img th:src="@{/provider-image/{id}(id=${chat.provider.id})}"
                         alt="avatar"
                         class="avatar me-3">
                </div>
                <div class="flex-fill">
                    <div class="d-flex justify-content-between align-items-center">
                        <span sec:authorize="hasRole('USER')" class="fw-semibold"
                              th:text="${chat.provider.companyName}"></span>
                        <span sec:authorize="hasRole('ADMIN')" class="fw-semibold"
                              th:text="${chat.client.userName}"></span>
                        <span class="badge rounded-pill bg-danger unread-badge ms-2"
                              th:attr="style=${(unreadMessages[chat.id]?:0) > 0 ? '' : 'display:none'}"
                              th:text="${unreadMessages[chat.id]}"></span>
                    </div>
                </div>
            </a>
        </div>
        <div class="col mx-2 my-auto d-flex flex-column border border-white border-2 border-dark-subtle"
             style="height: 80vh">
            <div class="chat-header d-flex justify-content-center align-items-center py-2 border-bottom border-dark-subtle w-100">
                <div class="d-flex align-items-center">
                    <img sec:authorize="hasRole('USER')"
                         th:if="${providerId != null}"
                         th:src="@{/provider-image/{id}(id=${providerId})}"
                         alt="Provider"
                         style="width:75px;height:75px;object-fit:cover;border-radius:50%;margin-right:12px;">
                    <h6 class="fw-semibold mb-0">Customer Service</h6>
                </div>
            </div>
            <div class="messages-list mt-3" id="messagesList">
                <div id="startMsg" th:if="${messages == null or #lists.isEmpty(messages)}"
                     class="d-flex h-100 w-100 justify-content-center align-items-center text-muted">
                    <span>Start chat 🗨️</span>
                </div>
                <div th:unless="${messages == null or #lists.isEmpty(messages)}"
                     th:each="msg : ${messages}"
                     th:class="'message ' + (${msg.senderId} == ${userId} ? 'sent' : 'received')">
                    <div th:text="${msg.content}">Message content</div>
                    <div class="message-time">
                        <span th:if="${msg.sentAt != null}"
                              th:text="${#temporals.format(msg.sentAt, 'HH:mm dd/MM/yyyy')}"></span>
                        <span th:if="${msg.sentAt == null}">---</span>
                    </div>
                </div>
            </div>
            <form th:if="${chatId != null}" method="post" class="chat-input d-flex mb-3">
                <input type="hidden" name="chatId" th:value="${chatId}"/>
                <input type="hidden" name="userId" th:value="${userId}"/>
                <input type="text" name="content" class="form-control chatInput" placeholder="Type your message..."
                       required autocomplete="off"/>
                <button class=" ms-2 btn btn-primary text-center" type="submit">Send</button>
            </form>
        </div>
    </div>
</div>
<script th:inline="javascript">
    const unreadCounts = /*[[${unreadMessages}]]*/ {};
</script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/chat.js"></script>
</body>
</html>
