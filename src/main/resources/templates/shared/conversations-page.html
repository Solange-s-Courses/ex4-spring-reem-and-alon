<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Conversations</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        .conversation-item { transition: background .15s }
        .conversation-item:hover { background:#f8f9fa; cursor:pointer }
        .avatar { width:48px; height:48px; object-fit:cover; border-radius:50% }
        .unread-badge { font-size:.75rem }
    </style>
</head>

<body class="bg-light">
<div class="container py-4">

    <h3 class="mb-4"><i class="bi bi-chat-dots me-1"></i> Conversations</h3>

    <!-- אם אין שיחות -->
    <div th:if="${#lists.isEmpty(conversations)}" class="text-center text-muted">
        <p class="mt-5"><i class="bi bi-inbox fs-1"></i></p>
        <p>No conversations yet.</p>
    </div>

    <!-- רשימת שיחות -->
    <div class="list-group shadow-sm">
        <a th:each="conv : ${conversations}"
           th:href="@{/conversations/{id}(id=${conv.conversationId})}"
           class="list-group-item list-group-item-action d-flex align-items-center conversation-item">

            <img th:if="${conv.partnerImgUrl != null}"
                 th:src="@{${conv.partnerImgUrl}}"
                 alt="avatar"
                 class="avatar me-3">


            <div class="flex-fill">
                <div class="d-flex justify-content-between">
                    <span class="fw-semibold" th:text="${conv.partnerName}"></span>
                </div>
            </div>

            <!-- אפשר להוסיף מונה הודעות שלא נקראו בעתיד -->
            <!--
            <span class="badge bg-primary rounded-pill unread-badge"
                  th:if="${conv.unreadCount > 0}"
                  th:text="${conv.unreadCount}">3</span>
            -->
        </a>
    </div>

</div>

<!-- לינק יעדי JS (אם תרצה) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- TODO: add WebSocket JS here if you want live updates of the list -->
</body>
</html>
