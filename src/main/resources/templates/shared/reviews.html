<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Provider Reviews</title>

  <!-- Bootstrap -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

  <!-- Custom -->
  <link rel="stylesheet" th:href="@{/css/reviews.css}">
</head>
<body>
<section class="header-section text-center">
  <h1>Provider Reviews</h1>
  <p>See what customers really think</p>
</section>
<section class="search-section">
  <div class="container">
    <form class="row gx-3 gy-2 align-items-end" method="get">
      <!--th:action="@{/providers/{id}/reviews(id=${provider.id})}"-->
      <div class="col-12 col-md-4">
        <label class="form-label" for="minRating">Minimum rating</label>
        <select id="minRating" name="minRating" class="form-select">
          <option value=""  th:selected="${param.minRating==null}">All ratings</option>
          <option value="5" th:selected="${param.minRating==5}">5 ⭐</option>
          <option value="4" th:selected="${param.minRating==4}">4 ⭐</option>
          <option value="3" th:selected="${param.minRating==3}">3 ⭐</option>
          <option value="2" th:selected="${param.minRating==2}">2 ⭐</option>
          <option value="1" th:selected="${param.minRating==1}">1 ⭐</option>
        </select>
      </div>

      <!-- filter btn -->
      <div class="col-auto">
        <button class="btn btn-search w-100" type="submit">
          <i class="bi bi-search me-1"></i> Filter
        </button>
      </div>

      <!-- write-review trigger -->
      <div class="col-auto ms-md-auto"
           sec:authorize="!hasRole('ADMIN') and !hasRole('SUPER_ADMIN')">
        <button class="btn btn-primary w-100"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#writeReviewForm">
          <i class="bi bi-pencil-square me-1"></i> Write a review
        </button>
      </div>
    </form>
    <div id="writeReviewForm" class="collapse mt-4"
         th:object="${reviewFields}"
         th:classappend="${#fields.hasAnyErrors()} ? ' show' : ''"
         sec:authorize="!hasRole('ADMIN') and !hasRole('SUPER_ADMIN')">

      <div class="card shadow-sm border-0">
        <div class="card-body">
          <form th:action="@{/reviews/add}" method="post">
            <input type="hidden" th:field="*{providerId}">
            <div class="row g-3 align-items-center mb-3">
              <div class="col-auto position-relative">
                <div th:if="${#fields.hasErrors('stars')}" th:errors="*{stars}" class="invalid-feedback d-block"></div>
                <div class="rating">
                  <input type="radio" th:field="*{stars}" id="star5"  value="5" hidden />
                  <label for="star5" title="5 stars"><i class="bi bi-star-fill"></i></label>

                  <input type="radio" th:field="*{stars}" id="star4"  value="4" hidden />
                  <label for="star4" title="4 stars"><i class="bi bi-star-fill"></i></label>

                  <input type="radio" th:field="*{stars}" id="star3"  value="3" hidden />
                  <label for="star3" title="3 stars"><i class="bi bi-star-fill"></i></label>

                  <input type="radio" th:field="*{stars}" id="star2"  value="2" hidden />
                  <label for="star2" title="2 stars"><i class="bi bi-star-fill"></i></label>

                  <input type="radio" th:field="*{stars}" id="star1"  value="1" hidden />
                  <label for="star1" title="1 star"><i class="bi bi-star-fill"></i></label>
                </div>
              </div>
            </div>
            <div class="col-12 col-md-9">
              <label class="form-label" for="title">Review title</label>
              <input id="title" th:field="*{title}" class="form-control" required
                     placeholder="Summarise your experience">
              <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="invalid-feedback d-block"></div>

            </div>

            <div class="col-12">
              <label class="form-label" for="content">Your review</label>
              <textarea id="content" th:field="*{reviewText}" rows="5" class="form-control"
                        placeholder="Share details…" required></textarea>
              <div th:if="${#fields.hasErrors('reviewText')}" th:errors="*{reviewText}" class="invalid-feedback d-block"></div>
            </div>
            <button class="btn btn-primary btn-md mt-3" type="submit">Submit review</button>
            <a th:href="@{/reviews/{providerProfileId}(providerProfileId=${provider.id})}"
               class="btn btn-secondary btn-md mt-3">
              Close & Reset
            </a>
          </form>
        </div>
      </div>
    </div>

  </div>
</section>

<div class="container my-5">
  <ul class="list-group list-group-flush" id="reviewsList">
    <li class="list-group-item p-0 border-0" th:each="review : ${reviews}">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <h6 class="card-title mb-0 fw-semibold" th:text="${review.title}"></h6>
            <div class="d-flex align-items-center gap-1">
              <span th:each="i : ${#numbers.sequence(1,5)}">
                <i class="bi" th:classappend="${i <= review.stars} ? 'bi-star-fill text-warning' : 'bi-star text-muted'"></i>
              </span>
              <span class="text-muted ms-1" th:text="${review.stars}"></span>
            </div>
          </div>
          <p class="card-text" style="white-space: pre-line;" th:text="${review.reviewText}"></p>
        </div>
      </div>
    </li>
  </ul>

  <div class="no-results text-center py-5" th:if="${#lists.isEmpty(reviews)}">
    <i class="bi bi-emoji-frown fs-1 mb-3"></i>
    <h3>No reviews found</h3>
    <p>Be the first to review or adjust your filters.</p>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
