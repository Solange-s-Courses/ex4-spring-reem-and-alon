<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Provider Reviews</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/reviews.css}">
</head>
<body>
<section class="header-section text-center">
    <h1>Provider Reviews</h1>
    <p>See what customers really think</p>
</section>
<div class="container search-section">
    <form class="search-form d-inline" th:action="@{/user/search-providers}" method="get"
          style="margin:0; padding:0; border:none;">
        <input type="hidden" name="category" th:value="${param.category}"/>
        <button class="btn btn-primary btn-md mt-3" type="submit">Back To Search</button>
    </form>
    <form class="row mt-3 gx-3 gy-2 align-items-end" th:action="@{/reviews}" method="get">
        <input type="hidden" name="providerProfileId" th:value="${provider.id}"/>
        <div class="col-12 col-md-4">
            <label class="form-label" for="minRating">Minimum rating</label>
            <select id="minRating" name="minRating" class="form-select">
                <option value="" th:selected="${currentMinRating == null or currentMinRating == ''}">All Categories
                </option>
                <option value="5" th:selected="${currentMinRating==5}">5 ⭐</option>
                <option value="4" th:selected="${currentMinRating==4}">4 ⭐</option>
                <option value="3" th:selected="${currentMinRating==3}">3 ⭐</option>
                <option value="2" th:selected="${currentMinRating==2}">2 ⭐</option>
                <option value="1" th:selected="${currentMinRating==1}">1 ⭐</option>
            </select>
        </div>
        <div class="col-auto">
            <button class="btn btn-search w-100" type="submit">
                <i class="bi bi-search me-1"></i> Filter
            </button>
        </div>
        <div class="col-auto ms-md-auto" sec:authorize="hasRole('USER')">
            <a class="btn btn-primary w-100" type="button"
               th:href="@{/reviews/add(providerProfileId=${provider.id})}">
                <i class="bi bi-pencil-square me-1"></i> add review
            </a>
        </div>
    </form>
</div>
<div class="container my-5">
    <ul class="list-group list-group-flush" id="reviewsList">
        <li class="list-group-item p-0 border-0" th:each="review : ${reviews}">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h6 class="card-title mb-0 fw-semibold" th:text="${review.title}"></h6>
                        <div class="d-flex align-items-center gap-1">
                            <span th:each="i : ${#numbers.sequence(1,5)}">
                              <i class="bi"
                                 th:classappend="${i <= review.stars} ? 'bi-star-fill text-warning' : 'bi-star text-muted'"></i>
                            </span>
                            <span class="text-muted ms-1" th:text="${review.stars}"></span>
                        </div>
                    </div>
                    <p class="card-text" style="white-space: pre-line;" th:text="${review.reviewText}"></p>
                    <small class="text-muted"
                           th:text="${#temporals.format(review.createdAt, 'dd/MM/yyyy HH:mm')}">תאריך</small>
                </div>
            </div>
        </li>
    </ul>
    <div class="no-results text-center py-5" th:if="${#lists.isEmpty(reviews)}">
        <i class="bi bi-emoji-frown fs-1 mb-3"></i>
        <h3>No reviews found</h3>
        <p>Be the first to review or adjust your filters.</p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
