<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Provider Reviews • TeleMatch</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Custom -->
    <link rel="stylesheet" th:href="@{/css/reviews.css}">
</head>
<body>

<!-- ░░ Header ░░ -->
<section class="header-section text-center">
    <h1>Provider Reviews</h1>
    <p>See what customers really think</p>
</section>

<!-- ░░ Filter & Write-review ░░ -->
<section class="search-section">
    <div class="container">

        <!-- filter row -->
        <form class="row gx-3 gy-2 align-items-end"
              method="get"
              th:action="@{/providers/{id}/reviews(id=${provider.id})}">

            <!-- select -->
            <div class="col-12 col-md-4">
                <label class="form-label" for="minRating">Minimum rating</label>
                <select id="minRating" name="minRating" class="form-select">
                    <option value=""  th:selected="${param.minRating==null}">All ratings</option>
                    <option value="5" th:selected="${param.minRating==5}">5 ⭐</option>
                    <option value="4" th:selected="${param.minRating==4}">4 ⭐</option>
                    <option value="3" th:selected="${param.minRating==3}">3 ⭐</option>
                    <option value="2" th:selected="${param.minRating==2}">2 ⭐</option>
                    <option value="1" th:selected="${param.minRating==1}">1 ⭐</option>
                </select>
            </div>

            <!-- filter btn -->
            <div class="col-auto">
                <button class="btn btn-search w-100" type="submit">
                    <i class="bi bi-search me-1"></i> Filter
                </button>
            </div>

            <!-- write-review trigger -->
            <div class="col-auto ms-md-auto"
                 sec:authorize="!hasRole('ADMIN') and !hasRole('SUPER_ADMIN')">
                <button class="btn btn-primary w-100"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#writeReviewForm">
                    <i class="bi bi-pencil-square me-1"></i> Write a review
                </button>
            </div>
        </form>
        <div id="writeReviewForm" class="collapse mt-4"
             sec:authorize="!hasRole('ADMIN') and !hasRole('SUPER_ADMIN')">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <form th:action="@{/reviews/add}" method="post">
                        <input type="hidden" name="providerId" th:value="${provider.id}">
                        <div class="row g-3 align-items-center mb-3">
                            <label class="col-auto col-form-label fw-semibold" for="rating">Rating</label>
                            <div class="col-auto">
                                <div class="rating">
                                    <input type="radio" id="star5" name="rating" value="5" hidden />
                                    <label for="star5" class="bi bi-star fs-3 text-muted" title="5 stars"></label>

                                    <input type="radio" id="star4" name="rating" value="4" hidden />
                                    <label for="star4" class="bi bi-star fs-3 text-muted" title="4 stars"></label>

                                    <input type="radio" id="star3" name="rating" value="3" hidden />
                                    <label for="star3" class="bi bi-star fs-3 text-muted" title="3 stars"></label>

                                    <input type="radio" id="star2" name="rating" value="2" hidden />
                                    <label for="star2" class="bi bi-star fs-3 text-muted" title="2 stars"></label>

                                    <input type="radio" id="star1" name="rating" value="1" hidden />
                                    <label for="star1" class="bi bi-star fs-3 text-muted" title="1 star"></label>
                                </div>
                            </div>
                            <div class="col-12 col-md-9">
                                <label class="form-label" for="title">Review title</label>
                                <input id="title" name="title" class="form-control" required
                                       placeholder="Summarise your experience">
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="content">Your review</label>
                                <textarea id="content" name="content" rows="5" class="form-control"
                                          placeholder="Share details…" required></textarea>
                            </div>
                        </div>
                        <button class="btn btn-primary mt-3" type="submit">Submit review</button>
                    </form>
                </div>
            </div>
        </div>

    </div>
</section>

<!-- ░░ Results ░░ -->
<div class="container my-5">

    <div class="results-info">
    <span class="results-count"
          th:text="${#lists.size(reviews)} + ' results found'">0 results found</span>
    </div>

    <div id="reviewsCarousel" class="carousel slide carousel-dark" data-bs-ride="false">

        <div class="carousel-inner">
            <div th:each="review, stat : ${reviews}"
                 th:if="${stat.index % 4 == 0}"
                 class="carousel-item"
                 th:classappend="${stat.index == 0} ? ' active'">
                <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">

                    <div th:each="i : ${#numbers.sequence(0,3)}"
                         th:if="${stat.index + i < reviews.size()}"
                         class="col h-100">
                        <div th:insert="~{fragments/review-card :: reviewCard(review=${reviews[stat.index + i]})}"></div>
                    </div>

                </div>
            </div>

        </div>

        <button class="carousel-control-prev" type="button"
                data-bs-target="#reviewsCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button"
                data-bs-target="#reviewsCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <div class="no-results" th:if="${#lists.isEmpty(reviews)}">
        <i class="bi bi-emoji-frown mb-3"></i>
        <h3>No reviews found</h3>
        <p>Be the first to review or adjust your filters.</p>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
