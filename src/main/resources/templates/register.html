<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <title>Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <h2 class="mb-4">Register</h2>
      <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

      <form th:action="@{/register}" method="post" th:object="${user}">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input id="username" th:field="*{userName}" type="text" class="form-control" required autofocus/>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input id="email" th:field="*{email}" type="email" class="form-control" required/>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input id="password" th:field="*{password}" type="password" class="form-control" required/>
        </div>
        <button type="submit" class="btn btn-primary w-100">Add user</button>
      </form>

      <div class="mt-3 text-center">
        <a th:href="@{/login}">Back to login</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
