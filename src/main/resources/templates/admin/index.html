<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>Admin Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container-fluid mt-5">
    <h1 class="text-center mb-5" th:text="'Hello ' +${admin.userName}+ ' !'"></h1>
    <div class="row justify-content-center">
        <div class="col-4">
            <p class="h4 mb-3 text-start">My public info</p>
            <div th:if="${businessCard == null or !businessCard.complete}">
                <div class="alert alert-warning text-center">
                    haven't created a public profile info yet!<br>
                    <a th:href="@{/admin/create-profile}"
                       class="btn btn-primary mt-2">create profile card</a>
                </div>
            </div>
            <div th:if="${businessCard != null and businessCard.complete}">
                <div th:replace="~{fragments/adminprofilecard :: profileCard(businessCard=${businessCard})}"></div>
            </div>
        </div>

        <div class="col-7">
            <h3 class="text-center mb-4">Item List</h3>
            <div sec:authorize="hasRole('ADMIN')" class="d-flex justify-content-end mb-2">
                <button type="button" id="open-offer-btn" class="btn btn-primary">Add Item</button>
                <form id="form" class="needs-validation d-none" novalidate method="post" action="#">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                        <div class="invalid-feedback">
                            Please enter your username.
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                        <div class="invalid-feedback">
                            Please enter a valid email address.
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required minlength="6">
                        <div class="invalid-feedback">
                            Password must be at least 6 characters.
                        </div>
                    </div>

                    <button id="create-offer-btn" class="btn btn-primary" type="submit">Submit</button>
                </form>
            </div>

            <ul class="list-group">
                <li class="list-group-item" th:each="item : ${items}" th:text="${item}">Example Item</li>
            </ul>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/providerProfile.js}"></script>

</body>
</html>
