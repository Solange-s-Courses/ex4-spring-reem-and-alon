<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>Admin Page</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container-fluid mt-5">
    <h1 class="text-center mb-5" th:text="'Hello ' +${admin.userName}+ ' !'"></h1>
    <div class="row justify-content-center">
        <div class="col-4">
            <p class="h4 mb-3 text-start">My public info</p>
            <div th:if="${businessCard == null}">
                <div class="alert alert-warning text-center">
                    haven't created a public profile info yet!<br>
                    <a th:href="@{/admin/create-profile}"
                       class="btn btn-primary mt-2">create profile card</a>
                </div>
            </div>
            <div th:unless="${businessCard == null}">
                <div th:replace="~{fragments/business-card :: businessCard(businessCard=${businessCard})}"></div>
            </div>
        </div>

        <div class="col-7">
            <h3 class="text-center mb-4">My service packages List</h3>
            <div th:if="${planPackages != null}" th:replace="~{fragments/plan-packages :: planPackages(planPackages=${planPackages})}"></div>
            <a class="btn btn-primary" th:href="@{/admin/add-package}">Add new package</a>
        </div>
    </div>
</div>
</body>
</html>
