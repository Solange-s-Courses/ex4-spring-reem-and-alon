<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Create Your Plane Package</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5 d-flex justify-content-center">
    <form id="pkg-form" th:object="${planPackage}" th:action="@{/admin/add-package}" method="post"
          class="p-4 rounded-4 shadow-lg bg-white">
        <div class="mb-4 text-center">
            <div class="rounded-4 py-3 mb-3 bg-info-subtle">
                <i class="bi bi-person-circle fs-1"></i>
                <h4 class="fw-bold mb-0 mt-2">Create New Package</h4>
            </div>
        </div>
        <input type="hidden" th:field="*{id}" />
        <div class="mb-3">
            <label for="title" class="form-label fw-semibold">Title</label>
            <input type="text" th:field="*{title}" class="form-control rounded-3" id="title" placeholder="Title">
            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label fw-semibold">Description</label>
            <textarea th:field="*{description}" class="form-control rounded-3" id="description"
                      placeholder="Description"></textarea>
            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('description')}"
                 th:errors="*{description}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Discounts per Subscription Period</label>
            <div class="row g-2">
                <div class="col" th:each="option, idx : *{planOptions}">
                    <label th:for="${'planOptions' + idx.index + '.discount'}" class="form-label small" th:text="${option.periodName}"></label>
                    <input th:field="*{planOptions[__${idx.index}__].discount}"
                           type="number" step="0.01" min="0" max="100"
                           class="form-control rounded-3"
                           th:id="${'planOptions' + idx.index + '.discount'}"
                           placeholder="0-100">
                    <input type="hidden" th:field="*{planOptions[__${idx.index}__].periodId}" />
                    <input type="hidden" th:field="*{planOptions[__${idx.index}__].periodName}" />
                    <input type="hidden" th:field="*{planOptions[__${idx.index}__].months}" />
                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('planOptions[' + idx.index + '].discount')}"
                         th:errors="*{planOptions[__${idx.index}__].discount}"></div>
                </div>
            </div>
        </div>
        <div class="mb-3">
            <label for="monthlyCost" class="form-label fw-semibold">Monthly Cost</label>
            <input type="number" th:field="*{monthlyCost}" class="form-control rounded-3" id="monthlyCost" min="1">
            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('monthlyCost')}"
                 th:errors="*{monthlyCost}"></div>
        </div>
        <div class="mb-3">
            <label for="expiryDate" class="form-label fw-semibold">Expiry Date</label>
            <input type="date" th:field="*{expiryDate}" class="form-control rounded-3" id="expiryDate" required>
            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('expiryDate')}"
                 th:errors="*{expiryDate}"></div>
        </div>
        <input type="hidden" th:field="*{providerProfileId}"/>
        <div class="d-flex gap-4">
            <button type="submit" class="btn btn-success btn-lg rounded-3 flex-fill">
                <i class="bi bi-person-check me-2"></i>
                Add Package
            </button>
            <a th:href="@{/admin}"
               class="btn btn-secondary btn-lg rounded-3 shadow-sm flex-fill">
                <i class="bi bi-x-circle me-2"></i>Cancel
            </a>
        </div>
    </form>
</div>
</body>
</html>
