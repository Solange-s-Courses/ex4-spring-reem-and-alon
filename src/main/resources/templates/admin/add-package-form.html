<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Your Plane Package</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5 d-flex justify-content-center">
    <form action="/package-plan/add-package" method="post"
          class="p-4 rounded-4 shadow-lg bg-white">
        <div class="mb-4 text-center">
            <div class="rounded-4 py-3 mb-3 bg-info-subtle">
                <i class="bi bi-person-circle fs-1"></i>
                <h4 class="fw-bold mb-0 mt-2"> No packages </h4>
            </div>
        </div>
        <div class="mb-3">
            <label for="title" class="form-label fw-semibold">Title</label>
            <textarea class="form-control rounded-3" id="title" rows="3"
                      placeholder="Tell something about yourself"></textarea>
            <div class="invalid-feedback d-block"></div>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label fw-semibold">Plan Description</label>
            <input type="text" class="form-control rounded-3"  id="description"/>
            <div class="invalid-feedback d-block"></div>
        </div>

        <div class="mb-4">
            <label for="price" class="form-label fw-semibold">Price</label>
            <input type="text" class="form-control rounded-3"  id="price"/>
            <div class="invalid-feedback d-block"></div>
        </div>

        <div class="mb-4">
            <label for="packageType" class="form-label fw-semibold">Type</label>
            <select  id="packageType" class="form-select rounded-3">
                <option value="" selected>Select package type</option>
                <option th:each="type : ${planPackageTypes}" th:value="${type.displayName}" th:text="${type.displayName}"></option>
            </select>
            <div  class="invalid-feedback d-block"></div>
        </div>

        <div class="d-flex gap-4">
            <button type="submit" class="btn btn-success btn-lg rounded-3 flex-fill">
                <i class="bi bi-person-check me-2"></i>
                Add package
            </button>
            <a th:href="@{/admin}"
               class="btn btn-secondary btn-lg rounded-3 shadow-sm flex-fill">
                <i class="bi bi-x-circle me-2"></i>Cancel
            </a>
        </div>
    </form>
</div>
<script th:src="@{/js/planPackages.js}"></script>
</body>
</html>
