<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Admin Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <form th:action="@{/admin/create-profile}" th:object="${admin}" method="post">
        <input type="hidden" th:field="*{id}"/>
        <div class="mb-3">
            <label>About Me:</label>
            <textarea class="form-control" th:field="*{aboutMe}"></textarea>
        </div>
        <div class="mb-3">
            <label>Profile Picture URL:</label>
            <input type="text" class="form-control" th:field="*{profileUrl}"/>
        </div>
        <div class="mb-3">
            <label>Languages:</label>
            <select multiple class="form-select" th:field="*{languages}">
                <option th:each="lang : ${lang}" th:value="${lang}" th:text="${lang}"
                        th:selected="${admin.languages.contains(lang)}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Save changes</button>
    </form>
</div>
</body>
</html>
