<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Admin Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5">
    <form th:action="@{/admin/create-profile}" th:object="${admin}" method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <label for="aboutMe">About Me:</label>
            <textarea class="form-control" th:field="*{aboutMe}" id="aboutMe"></textarea>
            <div th:if="${#fields.hasErrors('aboutMe')}" th:errors="*{aboutMe}" class="text-danger"></div>
        </div>
        <div class="mb-3">
            <label for="imageFile">Profile Picture:</label>
            <input type="file" class="form-control" th:field="*{imageFile}" id="imageFile" accept="image/*"/>
        </div>
        <div class="mb-3">
            <label for="languages">Languages:</label>
            <select multiple class="form-select" th:field="*{languages}" id="languages" size="5">
                <option th:each="lang : ${lang}" th:value="${lang}" th:text="${lang}"></option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Save changes</button>
    </form>

</div>
</body>
</html>
