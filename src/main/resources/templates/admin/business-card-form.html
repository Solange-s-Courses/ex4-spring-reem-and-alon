<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Admin Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5 d-flex justify-content-center">
    <form th:action="@{/admin/create-profile}" th:object="${businessInfo}" method="post" enctype="multipart/form-data"
          class="p-4 rounded-4 shadow-lg bg-white">
        <div class="mb-4 text-center">
            <div class="rounded-4 py-3 mb-3 bg-info-subtle">
                <i class="bi bi-person-circle fs-1"></i>
                <h4 class="fw-bold mb-0 mt-2">Create business card</h4>
            </div>
        </div>
        <div class="mb-3">
            <label for="aboutMe" class="form-label fw-semibold">About Me</label>
            <textarea class="form-control rounded-3" th:field="*{aboutMe}" id="aboutMe" rows="3"
                      placeholder="Tell something about yourself"></textarea>
            <div th:if="${#fields.hasErrors('aboutMe')}" th:errors="*{aboutMe}" class="invalid-feedback d-block"></div>
        </div>

        <div class="mb-3">
            <label for="imageFile" class="form-label fw-semibold">Profile Picture</label>
            <input type="file" class="form-control rounded-3" th:field="*{imageFile}" id="imageFile" accept="image/*"/>
            <div th:if="${#fields.hasErrors('imageFile')}" th:errors="*{imageFile}" class="invalid-feedback d-block"></div>
        </div>

        <div class="mb-3">
            <label for="city" class="form-label fw-semibold">Profile Picture</label>
            <input type="text" class="form-control rounded-3" th:field="*{city}" id="city" />
            <div th:if="${#fields.hasErrors('city')}" th:errors="*{city}" class="invalid-feedback d-block"></div>
        </div>

        <div class="mb-4">
            <label for="jobTypes" class="form-label fw-semibold">Job Type</label>
            <select th:field="*{category}" id="jobTypes" class="form-select rounded-3">
                <option value="" selected>Select a job type</option>
                <option th:each="type : ${jobTypes}" th:value="${type}" th:text="${type.displayName}"></option>
            </select>
            <div th:if="${#fields.hasErrors('category')}" th:errors="*{category}" class="invalid-feedback d-block"></div>
        </div>

        <div class="d-flex gap-4">
            <button type="submit" class="btn btn-success btn-lg rounded-3 flex-fill">
                <i class="bi bi-person-check me-2"></i>
                Save Profile
            </button>
            <a th:href="@{/admin}"
               class="btn btn-secondary btn-lg rounded-3 shadow-sm flex-fill">
                <i class="bi bi-x-circle me-2"></i>Cancel
            </a>
        </div>
    </form>
</div>
</body>
</html>
