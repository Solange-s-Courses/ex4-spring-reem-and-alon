<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <title>Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <h2 class="mb-4">Login</h2>
      <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
<!--
      <div th:if="${param.rejected}" class="alert alert-danger">
        Your registration request was declined by the super admin.
      </div>
-->

      <div th:if="${param.pending}" class="alert alert-warning">
        Your profile is not yet approved.
      </div>
      <div th:if="${param.error}" class="alert alert-danger">
          Invalid username or password.
      </div>
      <form th:action="@{/login}" method="post">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input id="username" name="username" type="text" class="form-control" required autofocus/>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input id="password" name="password" type="password" class="form-control" required/>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
      <div class="mt-3 text-center">
        <a th:href="@{/register}">Don't have an account? Register here</a>
      </div>
      <div class="mt-3 text-center">
        <a th:href="@{/register-admin}">Want to register as admin? Register here</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
