<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container text-center py-5">
    <h1 class="display-4 text-danger mb-4">Something went wrong</h1>
    <p class="lead text-muted mb-3" th:text="'Error: ' + ${error}">An unexpected error occurred.</p>
    <a href="/" class="btn btn-primary mt-3">Back to Home</a>
</div>
</body>
</html>
