<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .error-card {
            max-width: 500px;
            margin: auto;
            margin-top: 10%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border: none;
        }
        .error-icon {
            font-size: 4rem;
            color: #dc3545;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card error-card">
        <div class="card-body text-center">
            <div class="error-icon mb-3">⚠️</div>
            <h3 class="card-title text-danger">Oops! Something went wrong</h3>
            <p class="card-text text-muted" th:text="'Error: ' + ${error}">An unexpected error occurred.</p>
            <a href="/login" class="btn btn-outline-danger mt-3">Back to Login</a>
        </div>
    </div>
</div>
</body>
</html>
