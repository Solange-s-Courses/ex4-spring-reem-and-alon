<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="subscriptionCard(subscription)">
    <div class="card shadow p-1 mx-1 h-100">
        <div class="card-header d-flex justify-content-between align-items-center">
            <small class="bg-success-subtle text-success-emphasis p-1 rounded-3">
                <i class="bi bi-check-circle"></i> Active Subscription
            </small>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-4 align-items-center">
                    <img th:src="@{/provider-image/{id}(id=${subscription.providerId})}"
                         class="img-fluid img-thumbnail w-100" style="object-fit: contain; aspect-ratio: 1/1;"
                         alt="Provider Image"/>
                </div>
                <div class="col-8 align-items-center">
                    <h5 class="mb-1" th:text="${subscription.category}">Category</h5>
                    <p class="text-muted small mb-1" th:text="${'by ' + subscription.providerName}">Provider</p>
                </div>
                <hr class="mt-1">
                <div class="col-12 mt-2">
                    <h6>Description</h6>
                    <p class="product-description mb-2" th:text="${subscription.planDescription}">Description</p>
                    <hr>
                </div>
                <div class="col-12 mt-2">
                    <span class="fw-bold" th:text="${subscription.monthlyCost}">299</span> ₪
                    <span class="product-type ms-2">/month</span><br>
                    <i class=" bi bi-stopwatch"></i>
                    <small class="me-0 mb-2 fs-6"> Expires at: 10-03-27</small>
                    <hr>
                </div>
                <div class="d-flex gap-2 mb-0">
                    <button type="button" class="btn btn-add flex-fill">
                        <i class="bi bi-chat-dots me-1"></i> Contact
                    </button>
                    <button type="button" class="btn btn-remove flex-fill">
                        <i class="bi bi-x-circle me-1"></i> Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
