<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="subscriptionCard(subscription)">
    <div class="card shadow p-2 mx-2">
        <div class="card-header d-flex justify-content-between align-items-center">
            <small class="bg-success-subtle text-success-emphasis p-1 rounded-3">
                <i class="bi bi-check-circle"></i> Active Subscription
            </small>
            <span class="product-rating">
                <i class="bi bi-star-fill"></i> 4.5
            </span>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-4">
                    <img th:src="@{/provider-image/{id}(id=${subscription.providerId})}"
                         class="img-fluid img-thumbnail" alt="Provider Image"/>
                </div>
                <div class="col-8">
                    <h5 class="mb-1" th:text="${subscription.category}">Category</h5>
                    <p class="text-muted small mb-1" th:text="${'by ' + subscription.providerName}">Provider</p>
                </div>
            </div>
            <div class="mt-2">
                <p class="product-description mb-2" th:text="${subscription.planDescription}">Description</p>
                <div class="mb-2">
                    <span class="fw-bold" th:text="${subscription.monthlyCost}">299</span>
                    <span class="currency">₪</span>
                    <span class="product-type ms-2">per month</span>
                </div>
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-add flex-fill">
                        <i class="bi bi-chat-dots me-1"></i> Contact
                    </button>
                    <button type="button" class="btn btn-remove flex-fill">
                        <i class="bi bi-x-circle me-1"></i> Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
