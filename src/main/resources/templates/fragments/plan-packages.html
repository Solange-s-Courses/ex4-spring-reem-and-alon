<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<body>

<div class="product-grid" th:fragment="planPackages(planPackages, page)">
    <div class="product-item" th:each="pkg : ${planPackages}">
        <div class="product-image">
            <i class="bi bi-briefcase"></i>
        </div>
        <div class="product-rating">
            <i class="bi bi-star-fill"></i> 4.5
        </div>

        <h3 class="product-title" th:text="${pkg.title}">Professional Service Package</h3>

        <p class="product-description" th:text="${pkg.description}">
            Comprehensive service description that provides detailed information about what this package includes and the benefits it offers.
        </p>

        <div class="product-price">
            <span th:text="${pkg.price}">299</span>
            <span class="currency">₪</span>
        </div>

        <div class="product-type" th:text="${pkg.packageType}">per package</div>

        <div class="product-buttons flex-fill" th:data-pkg-id="${pkg.id}" sec:authorize="hasRole('USER')">
            <div th:switch="${page}">
                <div th:case="'search'">
                    <button type="button" class="btn w-100 btn-add" th:classappend="${#lists.contains(shoppingCart, pkg.id)} ? 'd-none' : ''">
                        <i class="bi bi-cart-plus me-1"></i> Add to Cart
                    </button>
                    <button type="button" class="btn w-100 btn-remove" th:classappend="${#lists.contains(shoppingCart, pkg.id)} ? '' : 'd-none'">
                        Remove from <i class="bi bi-cart-dash me-1"></i>
                    </button>
                </div>
                <div th:case="'cart'">
                    <div class="d-flex gap-2 btn-in-cart">
                        <button type="button" class="btn btn-remove">
                            Remove from <i class="bi bi-cart-dash me-1"></i>
                        </button>
                        <a th:href="@{/cart/checkout}" class="btn btn-purchase">
                            purchase <i class="bi bi-cash-coin me-1 "></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
