<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<body>
<div class="card-group row row-cols-1 row-cols-md-2 g-4" th:fragment="planPackages(planPackages)">
    <div class="col" th:each="pkg : ${planPackages}">
        <div class="card h-100 shadow-lg border-0 rounded-4 position-relative overflow-hidden" style="min-height: 370px;">
            <div class="position-absolute top-0 start-0 w-100" style="height: 7px; background: linear-gradient(90deg, #2d313a, #fdb702);"></div>
            <div class="card-body pb-1 d-flex flex-column">
                <div class="d-flex align-items-center mb-3 mt-2">
                    <div class="bg-light p-2 rounded-circle me-2 d-flex align-items-center justify-content-center shadow-sm">
                        <i class="bi bi-box2-heart-fill fs-3"></i>
                    </div>
                    <h4 class="card-title mb-0 text-dark fw-bold flex-grow-1" th:text="${pkg.title}">Title</h4>
                </div>
                <div class="mb-4">
                    <p class="fw-semibold h5 mb-1 text-decoration-underline">Description</p>
                    <div class="fw-semibold" th:text="${pkg.description}">No description</div>
                </div>
                <div class="d-flex align-items-center mt-auto">
                    <span class="fw-bold fs-5 me-3">
                        <span th:text="${pkg.price}">0</span> ₪
                    </span>
                    <span class="text-muted small">/ </span>
                    <span th:text="${pkg.packageType}" class="text-muted small">/</span>
                </div>
            </div>
            <div class="card-footer bg-white border-0 d-flex justify-content-end gap-2 pb-3 pt-2">
                <form class="add-to-cart-form" action="#" method="post" sec:authorize="hasRole('USER')">
                    <input id="pkgId" type="hidden" name="pkgId" th:value="${pkg.id}">
                    <button type="submit" class="btn btn-success px-4 py-2 rounded-3 shadow-sm fw-semibold">
                        Add to cart <i class="bi bi-send ms-2"></i>
                    </button>
                </form>
            </div>
            <span class="position-absolute top-0 end-0 m-3 opacity-75">
        <i class="bi bi-star-fill text-warning fs-4"></i>
    </span>
        </div>

    </div>
</div>
</body>
</html>
