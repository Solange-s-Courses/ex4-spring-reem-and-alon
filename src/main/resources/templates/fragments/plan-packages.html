<!DOCTYPE html>

<!-- הקונטיינר החיצוני: 4 בשורה -->
<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4 align-items-start" th:fragment="planPackages(planPackages, page)">
    <div th:each="pkg : ${planPackages}" class="col">
        <div class="card shadow-sm h-100 border-0">
            <!-- Header Section with Image and Provider Info -->
            <div class="card-header bg-white border-0 p-3">
                <div class="row g-3 align-items-center">
                    <div class="col">
                        <img th:src="@{/provider-image/{id}(id=${pkg.providerProfile.id})}"
                             class="img-fluid object-fit-cover"
                             alt="Provider Image"/>
                    </div>
                    <div class="col d-flex flex-column">
                        <span class="badge bg-primary bg-opacity-10 text-primary small mb-1 text-center" th:text="${pkg.providerProfile.category}"></span>
                        <h6 class="mb-0 fw-semibold text-center" th:text="${'provider: ' +pkg.providerProfile.providerName}"></h6>
                    </div>
                </div>
            </div>

            <!-- Package Details Section -->
            <div class="card-body pt-2 pb-2">
                <!-- Package Details Section -->
                <div class="card-body pt-2 pb-2">
                    <h5 class="card-title mb-2 fw-bold" th:text="${pkg.title}">כותרת החבילה</h5>
                    <span class="badge bg-secondary bg-opacity-10 text-secondary mb-2" th:text="${pkg.packageType}">סוג החבילה</span>
                </div>

                <!-- Footer Section with Price and Reviews -->
                <div class="card-footer bg-white border-0 pt-0">
                    <!-- Price Section -->
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div>
                            <span class="h5 mb-0 fw-bold text-success" th:text="${pkg.monthlyCost + '₪'}">299₪</span>
                            <small class="text-muted d-block">לחודש</small>
                        </div>
                        <div class="text-end">
                            <small class="text-muted" th:text="${pkg.packageType}">Package Type</small>
                        </div>
                    </div>

                    <!-- Reviews Section - Only for Users -->
                    <div class="d-flex justify-content-between align-items-center border-top pt-3">
                        <div class="d-flex align-items-center">
                            <div class="d-flex text-warning me-2">
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-half"></i>
                            </div>
                            <span class="fw-semibold me-1">4.5</span>
                        </div>
                        <small class="fw-bolder"><a href="#" class="link-body-emphasis link-underline-opacity-0 link-underline-opacity-75-hover">(1,679 ביקורות)</a></small>
                    </div>

                    <!-- Action Button -->
                    <div class="mt-3">
                        <button class="btn btn-outline-secondary btn-sm w-100" type="button"
                                data-bs-toggle="collapse"
                                th:data-bs-target="${'#collapse' + pkg.title}"
                                aria-expanded="false" aria-controls="multiCollapseExample2">
                            <i class="bi bi-eye me-1"></i>
                            See description
                        </button>
                    </div>
                    <div class="collapse multi-collapse" th:id="${'collapse' + pkg.title}">
                        <div class="card card-body" th:text="${pkg.description}">
                            Some placeholder content for the first collapse component of this multi-collapse example. This panel is hidden by default but revealed when the user activates the relevant trigger.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
