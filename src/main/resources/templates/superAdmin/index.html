<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Super Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .list-group-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-group .btn {
            min-width: 90px;
        }
    </style>
</head>
<body>
<div class="container py-5">
    <h1 class="mb-4 text-center">Pending Approvals</h1>

    <div th:if="${#lists.isEmpty(pendingProfiles)}" class="alert alert-info text-center">
        No pending provider profiles.
    </div>

    <ul class="list-group shadow" th:if="${not #lists.isEmpty(pendingProfiles)}">
        <li class="list-group-item" th:each="profile : ${pendingProfiles}">
            <div>
                <strong th:text="${profile.providerName}">Provider Name</strong>
                <small class="d-block text-muted" th:text="'Category: ' + ${profile.category}"></small>
                <small class="d-block text-muted" th:text="'Contact Info: ' + ${profile.contactInfo}"></small>
            </div>
            <div class="btn-group">
            <form th:action="@{/super-admin/approve/{id}(id=${profile.id})}" method="post" style="display: inline;">
                <button type="submit" class="btn btn-outline-success me-2">
                    <i class="bi bi-check-circle-fill"></i>
                </button>
            </form>

            <form th:action="@{/super-admin/reject/{id}(id=${profile.id})}" method="post" style="display: inline;">
                <button type="submit" class="btn btn-outline-danger">
                    <i class="bi bi-x-circle-fill"></i>
                </button>
            </form>
            </div>
        </li>
    </ul>
</div>
</body>
</html>
