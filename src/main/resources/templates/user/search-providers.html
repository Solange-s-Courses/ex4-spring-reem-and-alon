<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Search Services</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f7f8fa;
        }
        .search-card {
            background: #18181b;
            color: #fff;
            border-radius: 20px;
            box-shadow: 0 6px 24px 0 rgba(0,0,0,0.08);
        }
        .package-card {
            background: #23232a;
            color: #e8e8ea;
            border-radius: 18px;
            box-shadow: 0 3px 15px 0 rgba(30,32,36,0.06);
            min-height: 260px;
            transition: transform 0.1s;
        }
        .package-card:hover {
            transform: scale(1.03);
        }
        .card-title {
            font-weight: bold;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }
        .card-footer {
            background: transparent;
            border: none;
        }
        .search-title {
            color: #212121;
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-10 col-lg-8">
            <div class="search-card p-4 mb-5 shadow">
                <div class="search-title">Search for Services</div>
                <form class="row g-2 align-items-center justify-content-center" th:action="@{/search-providers}" method="post">
                    <div class="mb-4">
                        <label for="providerCategory" class="form-label fw-semibold">Type</label>
                        <select  id="providerCategory" class="form-select rounded-3" name="providerCategory">
                            <option value="" selected>Select package type</option>
                            <option th:each="type : ${providers}" th:value="${type.displayName}" th:text="${type.displayName}"></option>
                        </select>
                        <div  class="invalid-feedback d-block"></div>
                    </div>
                    <div class="col-md-2 d-grid">
                        <button type="submit" class="btn btn-warning">Search</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:if="${results != null}" th:replace="~{fragments/plan-packages :: planPackages(planPackages=${results})}"></div>

    <div th:unless="${results != null}" class="text-center mt-4 fs-5 text-muted">
        No services found.
    </div>
</div>
</body>
</html>
