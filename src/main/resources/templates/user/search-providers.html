<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Services</title>
    <!-- Bootstrap CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f7f8fa;
        }
        .search-card {
            background: #a5a4a4;
            border-radius: 20px;
            box-shadow: 0 6px 24px 0 rgba(0,0,0,0.08);
        }
        .search-title {
            color: #212121;
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div aria-live="polite" aria-atomic="true" class="position-fixed top-0 end-0 p-3" style="z-index: 9999">
    <div th:if="${successMessage}" class="toast align-items-center text-white bg-success border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" th:text="${successMessage}"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
    <div th:if="${errorMessage}" class="toast align-items-center text-white bg-danger border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" th:text="${errorMessage}"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>


<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-10 col-lg-8">
            <div class="search-card p-4 mb-5 shadow">
                <div class="search-title">Search for Services</div>
                <form class="row g-2 align-items-center justify-content-center" th:action="@{/user/search-providers}" method="post">
                    <div class="mb-4">
                        <label for="providerCategory" class="form-label fw-semibold">Type</label>
                        <select  id="providerCategory" class="form-select rounded-3" name="providerCategory">
                            <option value="" selected>Select package type</option>
                            <option th:each="type : ${providers}" th:value="${type.displayName}" th:text="${type.displayName}"></option>
                        </select>
                        <div  class="invalid-feedback d-block"></div>
                    </div>
                    <div class="col-md-2 d-grid">
                        <button type="submit" class="btn btn-warning">Search</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:if="${results != null}" th:replace="~{fragments/plan-packages :: planPackages(planPackages=${results})}"></div>

    <div th:unless="${results != null}" class="text-center mt-4 fs-5 text-muted">
        No services found.
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/messageToast.js"></script>
</body>
</html>
