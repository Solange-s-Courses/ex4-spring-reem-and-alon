<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Search Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/planPackages.css}">
    <link rel="stylesheet" th:href="@{/css/searchProviders.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="top-50 end-50 ms-auto p-3" style="z-index: 9999;">
    <div id="main-toast" class="toast align-items-center border-0 text-bg-success" data-bs-delay="5000">
        <div class="toast-header">
            <strong class="me-auto toast-title"></strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
        <div class="toast-body d-flex align-items-center">
        </div>
    </div>
</div>
<div class="header-section">
    <div class="container">
        <div class="row">
            <div class="col-12">
                <div class="header-content text-center">
                    <h1>Service Marketplace</h1>
                    <p>Discover professional services for your business</p>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="search-section">
    <div class="container">
        <form class="search-form" th:action="@{/user/search-providers}" method="get">
            <div class="flex-grow-1">
                <label for="category" class="form-label">Category</label>
                <select id="category" class="form-select" name="category" required>
                    <option value="" th:selected="${selectedCategory == null or selectedCategory == ''}" disabled>All
                        Categories
                    </option>
                    <option th:each="category : ${providers}"
                            th:value="${category}"
                            th:text="${category}"
                            th:selected="${selectedCategory == category}">
                    </option>
                </select>
                <div class="invalid-feedback d-block"></div>
            </div>
            <div>
                <button type="submit" class="btn btn-search">
                    <i class="bi bi-search me-1"></i> Search
                </button>
            </div>
        </form>
    </div>
</div>
<div class="container results-section">
    <div class="results-info mb-4">
        <div class="results-count">
            <span th:if="${results!= null}" th:text="${#lists.size(results)}">0</span> results found
        </div>
    </div>
    <div class="row row-cols-1">
        <div th:if="${results != null}" th:each="result : ${results}" class="card col shadow-sm mb-5">
            <div class="row my-auto card-header text-dark mb-4 align-content-center">
                <div class="col-12 col-md-2 d-flex justify-content-center mb-3 mb-md-0">
                    <img th:src="@{/provider-image/{id}(id=${result.plans[0].providerProfileId})}"
                         class="img-thumbnail img-fluid object-fit-cover" style="width: 120px" alt="Provider Image"/>
                </div>

                <div class="col-12 col-md-4 justify-content-start my-auto">
                    <h4 th:text="${result.providerName}" class="text-center text-md-start"></h4>
                    <div class="d-flex flex-column flex-md-row align-items-center align-md-items-start text-center text-md-start pt-3">
                        <div class="d-flex align-items-center text-center mb-2 mb-md-0">
                            <div class="d-flex text-warning me-2"
                                 th:with="flooredStars=${T(java.lang.Math).floor(result.avgStars).intValue()},
                                            showHalfStar=${result.avgStars % 1 >= 0.5},
                                            emptyStars=${5 - flooredStars - (showHalfStar ? 1 : 0)}">
                                <span th:if="${flooredStars != 0}" th:each="i : ${#numbers.sequence(1, flooredStars)}">
                                    <i class="bi bi-star-fill"></i>
                                </span>
                                <span th:if="${showHalfStar}">
                                    <i class="bi bi-star-half"></i>
                                </span>
                                <span th:if="${emptyStars > 0}" th:each="i : ${#numbers.sequence(1, emptyStars)}">
                                    <i class="bi bi-star"></i>
                                </span>
                            </div>
                            <span class="fw-semibold me-1" th:text="${#numbers.formatDecimal(result.avgStars, 1, 1)}">0.0</span>
                        </div>
                        <form class="search-form d-inline" th:action="@{/reviews}" method="get"
                              style="margin:0; padding:0; border:none;">
                            <input type="hidden" name="category" th:value="${selectedCategory}"/>
                            <input type="hidden" name="providerProfileId"
                                   th:value="${result.plans[0].providerProfileId}"/>
                            <button type="submit"
                                    class="btn btn-link p-0 m-0 align-baseline
                                            link-body-emphasis link-underline-opacity-0 link-underline-opacity-75-hover ms-md-4 fw-bolder"
                                    style="font-size: inherit;">
                                <span th:text="${result.reviewCount}">0</span> reviews <span class="d-none d-md-inline">(click here to see reviews)</span>
                            </button>
                        </form>
                    </div>
                </div>
                <div th:replace="~{fragments/plan-package-carousel :: planCarousel(plans=${result.plans}, pageName=${'search'})}"></div>
            </div>
        </div>

        <div th:unless="${results != null}" class="no-results">
            <i class="bi bi-search"></i>
            <h3>No results found</h3>
            <p>Try adjusting your search criteria or browse our categories to find what you're looking for.</p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/messageToast.js"></script>
</body>
</html>
