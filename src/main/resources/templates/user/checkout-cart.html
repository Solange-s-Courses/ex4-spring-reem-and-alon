<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>My Cart</title>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/planPackages.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="top-50 end-50 ms-auto p-3" style="z-index: 9999;">
    <div id="main-toast" class="ms-auto toast align-items-center border-0 text-bg-success" data-bs-delay="5000">
        <div class="toast-header">
            <strong class="me-auto toast-title"></strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
        <div class="toast-body d-flex align-items-center"></div>
    </div>
</div>
<div class="container">
    <h1 class="text-center fw-bold mb-4">Current Packages in Cart</h1>
    <div th:if="${cartItems != null and !cartItems.isEmpty()}">
        <div class="cart-items row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4 mb-4">
            <div th:each="cartItem : ${cartItems}" class="col">
                <div class="card h-100 shadow align-items-stretch">
                    <div class="card-header bg-light border-0 py-2 text-center">
                        <span class="badge bg-secondary text-white small"
                              th:if="${cartItem.planPackage.expiryDate}">
                          <i class="bi bi-calendar-event me-1"></i>
                          Available until:
                          <span th:text="${#temporals.format(cartItem.planPackage.expiryDate, 'dd/MM/yyyy')}"></span>
                        </span>
                    </div>
                    <div sec:authorize="hasRole('USER')" class="row mx-auto">
                        <div class="col-4 align-items-center mx-2">
                            <img th:src="@{/provider-image/{id}(id=${cartItem.planPackage.providerProfile.id})}"
                                 class="img-fluid img-thumbnail w-100" style="object-fit: contain; aspect-ratio: 1/1;"
                                 alt="Provider Image"/>
                        </div>
                        <div class="col-6 align-items-center my-auto">
                            <h5 class="mb-1" th:text="${cartItem.planPackage.providerProfile.category.name}">Category</h5>
                            <p class="text-muted small mb-2" th:text="${'by ' + cartItem.planPackage.providerProfile.companyName}">Provider</p>
                        </div>
                    </div>
                    <hr class="mt-1">
                    <div class="card-body d-flex flex-column justify-content-between h-100">
                        <div>
                            <h5 class="fw-bold text-primary text-center mb-2"
                                th:text="${cartItem.planPackage.title}"></h5>
                            <div class="justify-content-center mb-3">
                                <p class="text-muted fw-bolder small description-fixed"
                                   th:text="${cartItem.planPackage.description}"
                                   th:title="${cartItem.planPackage.description}">
                                </p>
                            </div>
                            <div class="row g-3 justify-content-center align-items-center text-center mt-5">
                                <div class="col-12">
                                    <div class="subscription-option border align-items-center border-2 border-primary bg-light shadow-sm position-relative">
                                        <div class="justify-content-center mt-4">
                                            <span class="badge bg-warning text-dark position-absolute top-0 start-50 translate-middle"
                                                  th:text="${cartItem.discount + '% OFF'}"></span>
                                            <div class="fw-bold text-primary"></div>
                                            <div class="fw-bolder text-dark"
                                                 th:text="${#numbers.formatDecimal(cartItem.planPackage.monthlyCost * (1.0 - cartItem.discount/100.0), 1, 1) + '₪/month'}">
                                            </div>

                                            <small class="text-muted">
                                                Total: <span class="fw-semibold"
                                                             th:text="${#numbers.formatDecimal(cartItem.planPackage.monthlyCost * (1.0 - cartItem.discount/100.0) * 3, 1, 1) + '₪'}"></span>
                                            </small>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <form action=# class="mt-3 remove-from-cart-form" method="post">
                                <input type="hidden" name="pkgOptionId" th:value="${cartItem.id}"/>
                                <input type="hidden" name="pkgId" th:value="${cartItem.planPackage.id}"/>
                                <input type="hidden" name="subPkgName" th:value="${cartItem.period.name}"/>
                                <input type="hidden" name="monthlyCost"
                                       th:value="${#numbers.formatDecimal(cartItem.planPackage.monthlyCost * (1.0 - cartItem.discount/100.0), 1, 1)}"/>
                                <button type="submit" class="btn btn-outline-danger btn-remove btn-sm w-100">
                                    Remove from Cart <i class="bi bi-cart-dash ms-1"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row justify-content-center align-items-center cart-payment [[${#lists.size(cartItems) == 0} ? 'd-none' : '']]">
            <form class="col-12 justify-content-center mx-auto" th:action="@{/user/checkout}" method="post">
                <button type="submit" class="btn btn-primary">
                    Continue to Payment <i class="bi bi-arrow-bar-right ms-2"></i>
                </button>
            </form>
        </div>
    </div>

    <div class="row d-flex justify-content-center align-items-center">
        <div class="col-md-6 col-lg-4 text-center empty-cart">
            <div class="py-5">
                <h4 class="text-muted mb-3">Your cart is empty!</h4>
                <p class="text-muted mb-4">Your cart doesn't have any items in it</p>
                <a th:href="@{/user/search-providers}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left me-2"></i>Back to Search
                </a>
            </div>
        </div>
    </div>
</div>
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/js/messageToast.js"></script>
</body>
</html>
