<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="he">
<head>
  <title>העסקאות שלי</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background: #f8f9fa;
    }
    .cart-card {
      border: none;
      border-radius: 2rem;
      box-shadow: 0 4px 18px rgba(40, 54, 94, 0.07);
      transition: transform .1s;
    }
    .cart-card:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 8px 30px rgba(40, 54, 94, 0.13);
    }
    .card-header {
      background: linear-gradient(90deg, #313552, #fdb702 70%);
      color: #fff;
      border-radius: 2rem 2rem 0 0;
    }
    .price-badge {
      background: #fdb702;
      color: #313552;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 12px;
      padding: 0.4em 1em;
    }
    .remove-btn {
      position: absolute;
      top: 16px;
      right: 18px;
      background: #fff0;
      border: none;
      color: #c31b1b;
      font-size: 1.3rem;
    }
  </style>
</head>
<body>
<div class="container py-5">
  <h1 class="text-center mb-5 fw-bold">העסקאות שלך בסל</h1>
  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 justify-content-center">
    <div class="col" th:each="pkg : ${cartItems}">
      <div class="card cart-card position-relative">
        <button class="remove-btn" th:formaction="@{/cart/remove}" th:formmethod="post" title="הסר מהסל">
          <i class="bi bi-trash"></i>
        </button>
        <div class="card-header d-flex align-items-center justify-content-between">
          <span th:text="${pkg.title}" class="fs-5"></span>
          <span class="price-badge" th:text="${pkg.price} + ' ₪'"></span>
        </div>
        <div class="card-body">
          <p class="card-text mb-2" th:text="${pkg.description}">תיאור חבילה</p>
          <span class="badge bg-secondary" th:text="${pkg.packageType}">סוג</span>
        </div>
        <div class="card-footer bg-transparent border-0 text-end">
          <span class="text-muted small">ID #<span th:text="${pkg.id}"></span></span>
        </div>
      </div>
    </div>
  </div>
  <div th:if="${#lists.isEmpty(cartItems)}" class="text-center mt-5">
    <h4 class="text-muted">הסל שלך ריק 😊</h4>
  </div>
</div>
</body>
</html>
