<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="he">
<head>
  <title>My Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f8f9fa; }
    .cart-card {
      border: none;
      border-radius: 2rem;
      box-shadow: 0 4px 18px rgba(40, 54, 94, 0.07);
      position: relative;
      min-height: 285px;
      transition: transform .1s;
    }
    .card-header {
      background: linear-gradient(90deg, #313552, #fdb702 70%);
      color: #fff;
      border-radius: 2rem 2rem 0 0;
      padding: 1rem 1.5rem 1rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .profile-img {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid #fff;
      background: #e8e8e8;
    }
    .remove-btn {
      position: absolute;
      top: 18px;
      right: 22px;
      background: none;
      border: none;
      color: #c31b1b;
      font-size: 1.3rem;
      z-index: 10;
      opacity: 0.75;
      transition: opacity 0.2s;
    }
    .remove-btn:hover { opacity: 1; }
    .card-footer {
      background: #fff;
      border: none;
      border-radius: 0 0 2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1.5rem;
    }
    .pay-btn {
      margin-top: 2rem;
      min-width: 210px;
      font-size: 1.2rem;
      padding: 0.7rem 1.5rem;
      border-radius: 1.5rem;
      font-weight: 600;
      background: linear-gradient(90deg, #fdb702, #313552 90%);
      color: #fff;
      border: none;
      box-shadow: 0 2px 8px #e9c97436;
      transition: background 0.2s;
    }
    .pay-btn:hover {
      background: linear-gradient(90deg, #313552 60%, #fdb702 100%);
      color: #fff;
    }
  </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
  <h1 class="text-center mb-5 fw-bold">Current Packages in Cart</h1>
  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 justify-content-center">
    <div class="col" th:each="pkg : ${shoppingCart}">
      <div class="card cart-card">
        <!-- כפתור מחיקה -->
        <form th:action="@{/user/cart/remove}" method="post">
          <input type="hidden" name="pkgId" th:value="${pkg.id}"/>
          <button class="remove-btn" type="submit" title="Remove from cart">
            <i class="bi bi-trash"></i>
          </button>
        </form>
        <div class="card-header">
          <img th:src="@{/provider-image/{id}(id=${pkg.providerProfile.id})}"
               alt="Profile"
               class="profile-img me-2"
               th:alt="${pkg.providerProfile.providerName}" />
          <div>
            <div th:text="${pkg.providerProfile.providerName}" class="fw-bold fs-5"></div>
            <div th:text="${pkg.providerProfile.category}" class="small"></div>
          </div>
        </div>
        <div class="card-body pb-1">
          <p class="card-text mb-2 fw-semibold" th:text="${pkg.description}"></p>
          <span class="badge bg-secondary" th:text="${pkg.packageType}"></span>
        </div>
        <div class="card-footer">
          <span class="fs-5 fw-bold text-dark">
            <span th:text="${pkg.price}">0</span>₪
          </span>
        </div>
      </div>
    </div>
  </div>
  <div th:if="${#lists.isEmpty(shoppingCart)}" class="text-center mt-5">
    <h4 class="text-muted">Your cart is empty!</h4>
  </div>
  <div class="d-flex justify-content-center" th:if="${!#lists.isEmpty(shoppingCart)}">
    <form th:action="@{/user/cart/checkout}" method="post">
      <button type="submit" class="pay-btn">
        Continue to Payment <i class="bi bi-arrow-bar-right ms-2"></i>
      </button>
    </form>
  </div>
</div>
</body>
</html>
