<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>Admin Page</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: #f8fafc; min-height: 100vh;">
    <div th:replace="fragments/navbar :: navbar"></div>
    <div class="container d-flex flex-column justify-content-center align-items-center min-vh-100 py-5">

    <!-- Greeting -->
    <h1 class="display-5 fw-bold mb-4 text-primary text-center">
        Hello <span th:text="${userName}">User</span>!
    </h1>

    <!-- Inline Form -->
    <form class="row g-2 justify-content-center align-items-center mb-5" style="max-width:600px;">
        <div class="col-auto">
            <select class="form-select rounded-pill" th:field="*{dropdown1}">
                <option th:value="" selected disabled>Option 1</option>
                <option th:value="a">A</option>
                <option th:value="b">B</option>
            </select>
        </div>
        <div class="col-auto">
            <select class="form-select rounded-pill" th:field="*{dropdown2}">
                <option th:value="" selected disabled>Option 2</option>
                <option th:value="c">C</option>
                <option th:value="d">D</option>
            </select>
        </div>
        <div class="col-auto">
            <select class="form-select rounded-pill" th:field="*{dropdown3}">
                <option th:value="" selected disabled>Option 3</option>
                <option th:value="e">E</option>
                <option th:value="f">F</option>
            </select>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary rounded-pill px-4">
                <i class="bi bi-search"></i> Search
            </button>
        </div>
    </form>

    <!-- My Services Section -->
    <div class="w-100" style="max-width: 700px;">
        <h3 class="fw-bold text-center mb-3">My Services</h3>
        <ul class="list-group shadow-sm">
            <li class="list-group-item d-flex align-items-center justify-content-between rounded-3 mb-2" 
                th:each="service : ${myServices}" th:text="${service.name}">
                Service Name
            </li>
        </ul>
    </div>
</div>
</body>
</html>
