<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f8fafc; min-height: 100vh;">
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-5">

    <div class="row mb-4">
        <div class="col text-end">
            <a th:href="@{/search-providers}" class="btn btn-outline-primary">
                <i class="bi bi-search"></i> Go to Search
            </a>
        </div>
    </div>

    <div class="row mb-5">
        <div class="col text-center">
            <h1 class="display-5 fw-bold text-primary">
                Hello <span th:text="${userName}">User</span>!
            </h1>
        </div>
    </div>

    <div class="row justify-content-center" th:if="${packages != null and !packages.isEmpty()}">
        <div class="col-12 col-md-10 col-lg-8">
            <div id="packageCarousel" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner">
                    <div class="carousel-item" th:each="pkg, iterStat : ${packages}"
                         th:classappend="${iterStat.index == 0} ? ' active' : ''">
                        <div class="card shadow-sm">
                            <div class="card-body text-center">
                                <h5 class="card-title" th:text="${pkg.name}">Package Name</h5>
                                <p class="card-text" th:text="${pkg.description}">Package description</p>
                            </div>
                        </div>
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#packageCarousel" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#packageCarousel" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
            </div>
        </div>
    </div>

    <div class="row justify-content-center" th:if="${packages == null or packages.isEmpty()}">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card shadow-sm text-center mt-5">
                <div class="card-body">
                    <h5 class="card-title text-muted">You don't have any packages</h5>
                    <p class="card-text">You can explore available packages in the search page.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
