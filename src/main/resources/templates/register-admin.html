<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <title>Admin Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5 d-flex justify-content-center">
  <span class="alert-danger" th:if="${errorMessage != null}" th:text="${errorMessage}"></span>
  <form th:action="@{/register/provider}" th:object="${admin}" method="post" enctype="multipart/form-data"
        class="p-4 rounded-4 shadow-lg bg-white w-100" style="max-width: 600px;">
    <div class="mb-4 text-center">
      <div class="rounded-4 py-3 mb-3 bg-info-subtle">
        <i class="bi bi-person-plus fs-1"></i>
        <h4 class="fw-bold mb-0 mt-2">Register as Admin</h4>
      </div>
    </div>

    <div class="mb-3">
      <label for="userName" class="form-label fw-semibold">Username</label>
      <input type="text" th:field="*{userName}" id="userName" class="form-control rounded-3"/>
      <div th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}" class="invalid-feedback d-block"></div>
    </div>

    <div class="mb-3">
      <label for="email" class="form-label fw-semibold">Email</label>
      <input type="email" th:field="*{email}" id="email" class="form-control rounded-3"/>
      <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="invalid-feedback d-block"></div>
    </div>

    <div class="mb-3">
      <label for="password" class="form-label fw-semibold">Password</label>
      <input type="password" th:field="*{password}" id="password" class="form-control rounded-3"/>
      <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="invalid-feedback d-block"></div>
    </div>

    <hr class="my-4"/>

    <div class="mb-3">
      <label for="companyName" class="form-label fw-semibold">Company Name</label>
      <input type="text" th:field="*{companyName}" id="companyName" class="form-control rounded-3"/>
      <div th:if="${#fields.hasErrors('companyName')}" th:errors="*{companyName}" class="invalid-feedback d-block"></div>
    </div>

    <div class="mb-4">
      <label for="providerTypes" class="form-label fw-semibold">Select providing service category</label>
      <select th:field="*{category}" id="providerTypes" class="form-select rounded-3">
        <option value="" selected>Select providing service type</option>
        <option th:each="category : ${providers}" th:value="${category}" th:text="${category}"></option>
      </select>
      <div th:if="${#fields.hasErrors('category')}" th:errors="*{category}" class="invalid-feedback d-block"></div>
    </div>

    <div class="mb-3">
      <label for="imageFile" class="form-label fw-semibold">Upload company image</label>
      <input type="file" class="form-control rounded-3" th:field="*{imageFile}" id="imageFile" accept="image/*"/>
      <div th:if="${#fields.hasErrors('imageFile')}" th:errors="*{imageFile}" class="invalid-feedback d-block"></div>
    </div>

    <div class="d-flex gap-3">
      <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3">
        <i class="bi bi-check-circle me-2"></i> Submit Registration
      </button>
    </div>

    <div class="mt-3 text-center">
      <a th:href="@{/login}"><i class="bi bi-box-arrow-in-left"></i> Back to Login</a>
    </div>
  </form>
</div>

</body>
</html>
